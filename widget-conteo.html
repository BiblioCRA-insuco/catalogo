<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colección CRA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .widget {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 480px;
  }

  .card {
    flex: 1;
    background: #ffffff;
    border: 2px solid #feda00;
    border-radius: 10px;
    padding: 20px 16px 16px;
    position: relative;
    overflow: hidden;
  }

  /* acento lateral izquierdo */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: #feda00;
  }

  .card-label {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #2a1670;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .card-number {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 3rem;
    line-height: 1;
    color: #2a1670;
    padding-left: 2px;
    transition: opacity 0.3s;
  }

  .card-number.loading {
    opacity: 0.25;
  }

  .card-sub {
    font-size: 0.73rem;
    color: #8c8c9a;
    margin-top: 6px;
    padding-left: 2px;
    line-height: 1.4;
  }

  .card-icon {
    position: absolute;
    bottom: 12px; right: 14px;
    width: 28px; height: 28px;
    opacity: 0.12;
  }

  /* estado de error */
  .card-number.error {
    font-size: 1.2rem;
    opacity: 0.4;
    font-weight: 300;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="card">
    <div class="card-label">Libros</div>
    <div class="card-number loading" id="numLibros">···</div>
    <div class="card-sub">títulos en catálogo</div>
    <!-- ícono libro -->
    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#2a1670" stroke-width="1.5">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
  </div>

  <div class="card">
    <div class="card-label">Recursos</div>
    <div class="card-number loading" id="numRecursos">···</div>
    <div class="card-sub">ítems disponibles</div>
    <!-- ícono caja/recurso -->
    <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#2a1670" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
  </div>
</div>

<script>
  const SHEET_ID  = "1HmH2iZ8zk01LCoIZaRiBoRmXlVgEWi5-pDBR3QQEqsM";
  const GID_LIBROS    = "0";
  const GID_RECURSOS  = "2023874833";

  const CSV = (gid) =>
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;

  function parseCSV(text){
    const rows = []; let row = [], field = '', inQ = false;
    for(let i = 0; i < text.length; i++){
      const c = text[i];
      if(inQ){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;}else inQ=false; }else field+=c; }
      else{ if(c==='"') inQ=true; else if(c===','){row.push(field);field='';}
        else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
        else if(c!=='\r') field+=c; }
    }
    if(field||row.length){row.push(field);rows.push(row);}
    return rows;
  }

  function csvToObjects(text){
    const rows = parseCSV(text).filter(r => r.some(c => c.trim()));
    if(rows.length < 2) return [];
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1).map(r => {
      const obj = {};
      headers.forEach((h,i) => obj[h] = (r[i]??'').trim());
      return obj;
    });
  }

  async function load(){
    try {
      const [resL, resR] = await Promise.all([
        fetch(CSV(GID_LIBROS)),
        fetch(CSV(GID_RECURSOS))
      ]);
      const [libros, recursos] = await Promise.all([
        resL.text().then(csvToObjects),
        resR.text().then(csvToObjects)
      ]);

      const totalLibros = libros.filter(r =>
        !(r['Notas'] || '').toLowerCase().includes('retirado')
      ).length;

      const elL = document.getElementById('numLibros');
      const elR = document.getElementById('numRecursos');

      elL.classList.remove('loading');
      elR.classList.remove('loading');
      elL.textContent = totalLibros;
      elR.textContent = recursos.length;

    } catch(e) {
      ['numLibros','numRecursos'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('loading');
        el.classList.add('error');
        el.textContent = '—';
      });
    }
  }

  load();
</script>
</body>
</html>
