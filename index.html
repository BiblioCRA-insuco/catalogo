<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Biblioteca</title>
<link rel="stylesheet" href="styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HL5DMVR7LJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-HL5DMVR7LJ');
</script>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-row">
      <div class="brand-mark">
        <span class="stamp"></span>
        <h1 class="h2">Catálogo</h1>
      </div>
      <div class="meta-status" id="statusLine">Cargando catálogo…</div>
    </div>

    <div class="tabs-row" id="tabsRow">
      <button class="tab-btn active" data-tab="libros">Libros <span class="count" id="countLibros">0</span></button>
      <button class="tab-btn" data-tab="recursos">Recursos <span class="count" id="countRecursos">0</span></button>
    </div>
    <div>
      <label for="searchInput" class="visually-hidden">Buscador</label>
    </div>
    <div class="search-row">
      <div class="search-box">
        
        <input type="text" id="searchInput" placeholder="Buscar por título, autor o tema…">
        <button id="btnBuscar" aria-label="Buscar">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
      </div>
      <div class="view-toggle">
        <button id="btnGrid" title="Vista de tarjetas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Tarjetas
        </button>
        <button id="btnList" class="active" title="Vista de lista">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          Lista
        </button>
      </div>
    </div>
  </div>
</div>

<div class="layout">

  <aside class="filters">
    <h2>Filtros <button class="clear-filters" id="clearFilters">Limpiar todo</button></h2>

    <!-- Filtros para LIBROS -->
    <div id="filtersLibros">
      <div class="filter-group">
        <label for="filterAutor">Autor</label>
        <select id="filterAutor"><option value="">Todos los autores</option></select>
      </div>
      <div class="filter-group">
        <label for="filterAnio">Año de edición</label>
        <select id="filterAnio"><option value="">Todos los años</option></select>
      </div>
      <div class="filter-group">
        <label for="filterAsignatura">Asignatura</label>
        <select id="filterAsignatura"><option value="">Todas las asignaturas</option></select>
      </div>
      <div class="filter-group">
        <label for="filterTema">Tema</label>
        <select id="filterTema"><option value="">Todos los temas</option></select>
      </div>
    </div>

    <!-- Filtros para RECURSOS -->
    <div id="filtersRecursos" style="display:none;">
      <div class="filter-group">
        <label for="filterCategoria">Categoría</label>
        <select id="filterCategoria"><option value="">Todas las categorías</option></select>
      </div>
      <div class="filter-group">
        <label for="filterAsignaturaR">Asignatura</label>
        <select id="filterAsignaturaR"><option value="">Todas las asignaturas</option></select>
      </div>
    </div>
  </aside>

  <main>
    <div class="results-header">
      <div class="results-count"><strong id="resultCount">0</strong> ítems encontrados</div>
      <div class="active-filters" id="activeFilters"></div>
    </div>

    <div id="resultsContainer"></div>
  </main>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-" id="modalContent"></div>
</div>
<script src="script.js"></script>

</body>
</html>
