<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Biblioteca</title>
<link rel="stylesheet" href="/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-row">
      <div class="brand-mark">
        <span class="stamp"></span>
        Catálogo
      </div>
      <div class="meta-status" id="statusLine">Cargando catálogo…</div>
    </div>
    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar por título, autor o tema…">
      </div>
      <div class="view-toggle">
        <button id="btnGrid" title="Vista de tarjetas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Tarjetas
        </button>
        <button id="btnList" class="active" title="Vista de lista">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          Lista
        </button>
      </div>
    </div>
  </div>
</div>

<div class="layout">

  <aside class="filters">
    <h2>Filtros <button class="clear-filters" id="clearFilters">Limpiar todo</button></h2>

    <div class="filter-group">
      <label>Tipo de ítem</label>
      <div class="type-pills" id="typePills">
        <button data-type="" class="active">Todos <span class="count" id="countAll">0</span></button>
        <button data-type="libro">Libros <span class="count" id="countLibros">0</span></button>
        <button data-type="recurso">Recursos <span class="count" id="countRecursos">0</span></button>
      </div>
    </div>

    <div class="filter-group">
      <label for="filterAutor">Autor</label>
      <select id="filterAutor"><option value="">Todos los autores</option></select>
    </div>

    <div class="filter-group">
      <label for="filterApto">Apto para</label>
      <select id="filterApto"><option value="">Todos los cursos/niveles</option></select>
    </div>

    <div class="filter-group">
      <label for="filterAsignatura">Asignatura</label>
      <select id="filterAsignatura"><option value="">Todas las asignaturas</option></select>
    </div>

    <div class="filter-group">
      <label for="filterTema">Tema / Categoría</label>
      <select id="filterTema"><option value="">Todos los temas</option></select>
    </div>
  </aside>

  <main>
    <div class="results-header">
      <div class="results-count"><strong id="resultCount">0</strong> ítems encontrados</div>
      <div class="active-filters" id="activeFilters"></div>
    </div>

    <div id="resultsContainer"></div>
  </main>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
<script src="/script.js"></script>
</div>
</body>
</html>
